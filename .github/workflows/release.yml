name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and attach assets for, e.g. v0.0.2"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  assets:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      # Runs unit tests + the licenseGate check; integration tests stay out of release builds.
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --console=plain build

      # End-user bundle: runnable jar, the compose file for Postgres/MinIO/render-sidecar,
      # and the sidecar's source (GhostPDL stays a build-from-source container — D-018).
      - name: Assemble distribution zip
        run: |
          VERSION="${TAG#v}"
          DIST="retrospool-$VERSION"
          mkdir -p "dist/$DIST/render-sidecar"
          cp "build/libs/retrospool-$VERSION.jar" "dist/$DIST/"
          cp docker-compose.yml QUICKSTART.md README.md CHANGELOG.md LICENSE "dist/$DIST/"
          cp render-sidecar/Dockerfile render-sidecar/server.py "dist/$DIST/render-sidecar/"
          cd dist
          zip -r "$DIST.zip" "$DIST"
          sha256sum "$DIST.zip" > "$DIST.zip.sha256"

      - name: Upload assets to the release
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft --generate-notes
          fi
          gh release upload "$TAG" dist/*.zip dist/*.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber

  # App image only. The render sidecar is deliberately never published: shipping a
  # gpcl6 binary would take on AGPL corresponding-source obligations — end users
  # build it from the pinned tag's source instead (D-018 / D-020).
  image:
    needs: assets
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          VERSION="${TAG#v}"
          IMAGE="ghcr.io/spillers-technology/retrospool"
          docker buildx build \
            --platform linux/amd64 \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=Your AS/400 reports, as PDFs, over the web" \
            --label "org.opencontainers.image.version=$VERSION" \
            --tag "$IMAGE:$VERSION" \
            --tag "$IMAGE:latest" \
            --push .
