spring:
  application:
    name: retrospool
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spoolgateway}
    username: ${DB_USER:spool}
    password: ${DB_PASSWORD:spool}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Shared truststore used for SSL signon (SecureAS400 -> standard JSSE).
# Per-tenant truststores come later; empty path falls back to the JVM default.
gateway:
  truststore:
    path: ${TRUSTSTORE_PATH:}
    password: ${TRUSTSTORE_PASSWORD:}
    type: ${TRUSTSTORE_TYPE:PKCS12}
  # Landing object store (S3 API; MinIO locally via endpoint + path-style).
  storage:
    bucket: ${STORAGE_BUCKET:spool-landing}
    region: ${STORAGE_REGION:us-east-1}
    endpoint: ${STORAGE_ENDPOINT:}          # empty = real AWS
    path-style-access: ${STORAGE_PATH_STYLE:false}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
  # Encrypted secret store (D-023). Base64 32-byte AES key (or any passphrase, which is
  # SHA-256'd). Empty = the DB secret store is disabled and submitter-entered passwords
  # cannot be accepted at intake; env-var secret_refs (D-012) still resolve.
  secrets:
    encryption-key: ${SECRET_ENCRYPTION_KEY:}
  # GhostPDL render sidecar (D-018). Empty URL = renderer not configured; PCL
  # captures then land with render_status=FAILED and are retryable later.
  render:
    url: ${RENDER_URL:}
    timeout-seconds: ${RENDER_TIMEOUT_SECONDS:30}
    max-bytes: ${RENDER_MAX_BYTES:104857600}
